{% extends "base.html" %}
{% block title %}Login — ExpenseIQ{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-box">
    <h1 class="auth-title">Welcome back 👋</h1>
    <p class="auth-sub">Login to track your expenses</p>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email"
               placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:0.85rem;">
        Login →
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="{{ url_for('register') }}">Sign up</a>
    </p>
  </div>
</div>
{% endblock %}
