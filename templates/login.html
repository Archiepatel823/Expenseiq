{% extends "base.html" %}
{% block title %}Login — ExpenseIQ{% endblock %}

{% block extra_css %}
<style>
  .auth-wrapper {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .auth-box {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem;
  }

  .auth-title {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 0.3rem;
  }

  .auth-sub {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 2rem;
  }

  .auth-footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.88rem;
    color: var(--muted);
  }

  .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .auth-footer a:hover { text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-box">

    <h1 class="auth-title">Welcome back 👋</h1>
    <p class="auth-sub">Login to track your expenses</p>

    <!-- Login form — POST sends data to /login route -->
    <form method="POST" action="{{ url_for('login') }}">

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email"
               placeholder="you@example.com" required autocomplete="email"/>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••" required autocomplete="current-password"/>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:0.85rem;">
        Login →
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="{{ url_for('register') }}">Sign up</a>
    </p>

  </div>
</div>
{% endblock %}
