{% extends "base.html" %}
{% block title %}Register — ExpenseIQ{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-box">
    <h1 class="auth-title">Create account ✨</h1>
    <p class="auth-sub">Start tracking your expenses today</p>

    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Archie Patel" required
               value="{{ request.form.get('name', '') }}"/>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required
               value="{{ request.form.get('email', '') }}"/>
      </div>
      <div class="form-group">
        <label for="password">Password <span style="color:var(--muted); font-size:0.75rem;">(min 6 characters)</span></label>
        <input type="password" id="password" name="password" placeholder="••••••••" required/>
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:0.85rem;">
        Create Account →
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Login</a>
    </p>
  </div>
</div>
{% endblock %}
