{% extends "base.html" %}
{% block title %}Add Expense — ExpenseIQ{% endblock %}

{% block extra_css %}
<style>
  .form-card {
    max-width: 560px;
    margin: 0 auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem;
  }

  .form-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    margin-bottom: 0.3rem;
  }

  .form-sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 2rem; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }

  .form-actions {
    display: flex;
    gap: 0.8rem;
    margin-top: 1.5rem;
  }
</style>
{% endblock %}

{% block content %}
<div class="form-card">

  <h1 class="form-title">New Expense 💸</h1>
  <p class="form-sub">Fill in the details below to log an expense.</p>

  <!-- Form posts to the same /expenses/add route (POST method) -->
  <form method="POST" action="{{ url_for('add_expense') }}">

    <div class="form-group">
      <label for="title">Expense Title *</label>
      <input type="text" id="title" name="title"
             placeholder="e.g. Lunch at Zomato"
             required
             value="{{ form_data.get('title', '') }}"/>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="amount">Amount (₹) *</label>
        <input type="number" id="amount" name="amount"
               placeholder="0.00"
               step="0.01" min="0.01"
               required
               value="{{ form_data.get('amount', '') }}"/>
      </div>

      <div class="form-group">
        <label for="date">Date *</label>
        <input type="date" id="date" name="date"
               required
               value="{{ form_data.get('date', '') }}"/>
      </div>
    </div>

    <div class="form-group">
      <label for="category">Category *</label>
      <select id="category" name="category" required>
        <option value="">— Select category —</option>
        {% for cat in categories %}
          <option value="{{ cat }}"
            {% if form_data.get('category') == cat %}selected{% endif %}>
            {{ cat }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label for="description">Description <span style="color:var(--muted); font-size:0.75rem;">(optional)</span></label>
      <textarea id="description" name="description"
                rows="3"
                placeholder="Any additional notes...">{{ form_data.get('description', '') }}</textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" style="flex:1; justify-content:center; padding:0.85rem;">
        Save Expense ✓
      </button>
      <a href="{{ url_for('expenses') }}" class="btn btn-secondary">Cancel</a>
    </div>

  </form>
</div>

<!-- Auto-fill today's date -->
<script>
  const dateInput = document.getElementById('date');
  if (!dateInput.value) {
    // Set today's date as default
    const today = new Date().toISOString().split('T')[0];
    dateInput.value = today;
  }
</script>
{% endblock %}
